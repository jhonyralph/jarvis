<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Jarvis</title>
  <style>
    :root { color-scheme: light dark; --bg:#0b0d10; --side:#0e1216; --panel:#161b21; --me:#2563eb; --bot:#1b2127; --text:#e6e9ec; --mut:#8b98a5; --line:#ffffff14; --code:#0d1117; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--text); height:100dvh; overflow:hidden; }
    #app { display:flex; height:100dvh; }
    #side { width:260px; flex:none; background:var(--side); border-right:1px solid var(--line); display:flex; flex-direction:column; padding:12px; gap:6px; overflow:auto; }
    #side .sec { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin:12px 4px 4px; }
    #recents .item, #files .item { padding:8px 10px; border-radius:9px; cursor:pointer; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #recents .item:hover { background:#ffffff0d; } #recents .item.active { background:#ffffff14; }
    #files .item { color:var(--mut); font-size:12.5px; cursor:default; }
    .link { color:var(--mut); font-size:12px; cursor:pointer; padding:2px 6px; } .link:hover { color:var(--text); }
    .spacer { flex:1; }
    main { flex:1; display:flex; flex-direction:column; min-width:0; }
    header { display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--line); }
    header #title { font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .dot { width:9px;height:9px;border-radius:50%;background:#f43f5e; flex:none; }
    .dot.on { background:#22c55e; }
    select, button.ghost, .chip { background:var(--panel); color:var(--text); border:1px solid #ffffff1f; border-radius:9px; padding:6px 8px; font:inherit; font-size:12.5px; }
    button.ghost, select { cursor:pointer; }
    .chip { display:inline-flex; align-items:center; gap:4px; max-width:170px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .chip.lock { color:var(--mut); }
    button { border:0; border-radius:10px; padding:8px 13px; background:var(--me); color:#fff; font:inherit; font-weight:600; cursor:pointer; }
    button.ghost { background:var(--panel); color:var(--text); border:1px solid #ffffff1f; font-weight:500; }
    button.on { background:#22c55e; color:#04210f; }
    #newSess { width:100%; }
    #limit { padding:10px 14px; background:#7c2d12; color:#fed7aa; font-size:13px; }
    #log { flex:1; overflow:auto; padding:18px; display:flex; flex-direction:column; gap:14px; }
    .msg.me { align-self:flex-end; background:var(--me); color:#fff; padding:9px 13px; border-radius:14px; white-space:pre-wrap; max-width:min(88%,760px); overflow-wrap:anywhere; }
    .msg.bot { align-self:flex-start; background:var(--bot); padding:2px 15px; border-radius:14px; max-width:min(88%,760px); overflow-wrap:anywhere; min-width:0; }
    .msg.err { align-self:center; color:#fca5a5; font-size:13px; }
    .msg.bot.pending { padding:11px 15px; } .typing { display:inline-flex; gap:5px; align-items:center; }
    .typing i { width:7px; height:7px; border-radius:50%; background:var(--mut); animation:blink 1.2s infinite both; }
    .typing i:nth-child(2){ animation-delay:.2s; } .typing i:nth-child(3){ animation-delay:.4s; }
    @keyframes blink { 0%,80%,100%{ opacity:.25 } 40%{ opacity:1 } }
    .msg.bot p { margin:.55em 0; } .msg.bot h4 { margin:.7em 0 .3em; font-size:15px; }
    .msg.bot ul,.msg.bot ol { margin:.4em 0; padding-left:1.3em; }
    .msg.bot code { background:#ffffff1a; padding:1px 5px; border-radius:5px; font:13px ui-monospace,monospace; overflow-wrap:anywhere; }
    .msg.bot pre { position:relative; background:var(--code); border:1px solid var(--line); border-radius:10px; padding:12px; overflow:auto; max-width:100%; }
    .msg.bot pre code { overflow-wrap:normal; white-space:pre; }
    .msg.bot pre code { background:none; padding:0; display:block; } .msg.bot pre .copy { position:absolute; top:6px; right:6px; padding:3px 8px; font-size:11px; }
    .msg.bot table { border-collapse:collapse; margin:.5em 0; display:block; overflow-x:auto; }
    .msg.bot th,.msg.bot td { border:1px solid var(--line); padding:5px 10px; text-align:left; font-size:13.5px; } .msg.bot th { background:#ffffff0d; }
    .msg.bot img { max-width:100%; border-radius:8px; margin:.4em 0; display:block; } .msg.bot a { color:#7cc0ff; }
    .msg.bot blockquote { border-left:3px solid #ffffff2f; margin:.5em 0; padding:.1em .8em; color:var(--mut); }
    .msg.bot .match { border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin:.4em 0; cursor:pointer; }
    .msg.bot .match:hover { background:#ffffff0d; } .msg.bot .exec { padding:3px 8px; font-size:11px; margin-top:5px; }
    /* composer: input on top, controls BELOW it */
    #composer { border-top:1px solid var(--line); padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
    #attachRow { display:flex; gap:6px; flex-wrap:wrap; }
    #attachRow .chip { font-size:12px; padding:4px 8px; cursor:pointer; }
    #input { width:100%; resize:none; background:var(--panel); color:var(--text); border:1px solid #ffffff1f; border-radius:12px; padding:10px 12px; font:inherit; max-height:160px; }
    .controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .controls .spacer { flex:1; min-width:8px; }
    #status { font-size:12.5px; color:var(--mut); display:inline-flex; align-items:center; gap:6px; }
    #status.speaking { color:#22c55e; } #status.listening { color:#f59e0b; }
    #status .pulse { width:8px; height:8px; border-radius:50%; background:currentColor; animation:p 1s infinite; }
    @keyframes p { 0%,100%{opacity:.3} 50%{opacity:1} }
    .usage { color:var(--mut); font-size:11.5px; }
    .modal { position:fixed; inset:0; background:#000a; display:flex; align-items:center; justify-content:center; padding:16px; z-index:30; }
    .modal .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px; width:min(480px,100%); display:flex; flex-direction:column; gap:11px; max-height:90dvh; overflow:auto; }
    .modal label { display:flex; flex-direction:column; gap:5px; font-size:13px; color:var(--mut); }
    .modal label.row { flex-direction:row; align-items:center; gap:8px; }
    .modal .row { display:flex; gap:8px; } .modal .sec { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-top:6px; }
    .mut { color:var(--mut); font-size:12.5px; word-break:break-all; }
    .soon { font-size:10px; background:#ffffff14; border-radius:6px; padding:1px 5px; color:var(--mut); }
    .dirlist { border:1px solid var(--line); border-radius:10px; overflow:auto; max-height:240px; }
    .dirlist div { padding:8px 12px; cursor:pointer; font-size:13.5px; border-bottom:1px solid var(--line); } .dirlist div:hover { background:#ffffff0d; }
    /* clickable footer pills (agent / folder / model / effort) */
    .pill { background:var(--panel); color:var(--text); border:1px solid #ffffff1f; border-radius:9px; padding:6px 10px; font:inherit; font-size:12.5px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:5px; max-width:190px; }
    .pill:hover { border-color:#ffffff40; background:#1c232b; }
    .pill .cap { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #modelName { text-transform:capitalize; }
    .pill.lock { color:var(--mut); cursor:default; opacity:.75; } .pill.lock:hover { border-color:#ffffff1f; background:var(--panel); }
    /* popover anchored above a pill */
    .pop { position:fixed; z-index:40; background:var(--panel); border:1px solid #ffffff2b; border-radius:12px; padding:10px; box-shadow:0 14px 44px #000b; min-width:230px; max-width:340px; }
    .pop .ph { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin:0 2px 8px; }
    .pop .opt { padding:8px 9px; border-radius:8px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:8px; }
    .pop .opt:hover { background:#ffffff0d; } .pop .opt.sel { background:#ffffff17; }
    .pop .opt .r { margin-left:auto; color:var(--mut); font-size:11px; }
    .pop .slbl { display:flex; justify-content:space-between; font-size:11px; color:var(--mut); margin:2px 2px 10px; }
    .pop input[type=range] { width:100%; accent-color:var(--me); }
    .pop .sval { text-align:center; font-size:13.5px; margin-top:10px; font-weight:600; }
    .pop .fpath { font-size:12px; color:var(--mut); margin-bottom:6px; word-break:break-all; }
    .pop .flist { max-height:220px; overflow:auto; border:1px solid var(--line); border-radius:9px; }
    .pop .flist div { padding:7px 10px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--line); }
    .pop .flist div:last-child { border-bottom:0; } .pop .flist div:hover { background:#ffffff0d; }
    .pop .frow { display:flex; gap:6px; margin-top:8px; } .pop .frow button { flex:1; font-size:12px; padding:7px 8px; }
    .modal input[type=text] { background:var(--bg); color:var(--text); border:1px solid #ffffff1f; border-radius:10px; padding:11px 13px; font:inherit; }
    .pop { max-height:70vh; overflow:auto; }
    button.danger { background:#dc2626; }
    /* recents: agent badge + native tag */
    #recents .item { display:flex; align-items:center; gap:6px; }
    #recents .rtitle { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #recents .rbadge { flex:none; font-size:11px; } #recents .rnat { flex:none; font-size:9px; color:var(--mut); background:#ffffff12; border-radius:5px; padding:1px 4px; }
    #roBanner { padding:8px 14px; background:#1e293b; color:#cbd5e1; font-size:12.5px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:6px; }
    .ctlpills { display:contents; } /* desktop: children flow into .controls flex */
    #sideClose, #backdrop { display:none; }
    .hidden { display:none !important; } #menuBtn { display:none; }
    /* ---------------- mobile ---------------- */
    @media (max-width:760px) {
      body { font-size:16px; }
      header { padding:12px 14px; gap:10px; } header #title { font-size:16px; }
      #menuBtn { display:inline-flex; align-items:center; justify-content:center; min-width:42px; min-height:42px; font-size:19px; }
      /* off-canvas sidebar with backdrop + close button */
      #side { position:fixed; z-index:30; height:100dvh; width:86vw; max-width:340px; transform:translateX(-100%); transition:transform .22s ease; padding:14px; gap:8px; box-shadow:2px 0 28px #0008; }
      #side.open { transform:none; }
      #sideClose { display:flex; align-self:flex-end; min-width:40px; min-height:40px; align-items:center; justify-content:center; font-size:18px; margin-bottom:2px; }
      #backdrop { display:block; position:fixed; inset:0; background:#0009; z-index:25; }
      #side .sec { font-size:12px; margin:14px 4px 6px; }
      #recents .item, #files .item { padding:12px; font-size:15px; }
      #newSess, #settingsBtn, #moreBtn { padding:13px; font-size:15px; }
      .link { font-size:14.5px; padding:10px 6px; }
      #log { padding:14px; gap:12px; } .msg.me, .msg.bot { max-width:92%; }
      .msg.me { font-size:15.5px; } .msg.bot { font-size:15.5px; }
      /* composer: bigger targets; pills in one scrollable row; send full width */
      #composer { padding:10px 12px calc(10px + env(safe-area-inset-bottom)); gap:10px; }
      #input { font-size:16px; padding:13px 14px; } /* 16px avoids iOS focus-zoom */
      .controls { flex-wrap:wrap; gap:8px; }
      .ctlpills { display:flex; gap:8px; overflow-x:auto; flex:1 1 100%; padding-bottom:3px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
      .ctlpills::-webkit-scrollbar { display:none; } .ctlpills .spacer { display:none; }
      .pill, .controls button.ghost { min-height:42px; font-size:13.5px; padding:10px 13px; flex:none; }
      .pill { max-width:none; }
      #sendBtn { flex:1 1 100%; min-height:48px; font-size:16px; }
      #status { flex:none; white-space:nowrap; }
      .modal .card { width:100%; } .pop { max-width:92vw; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="backdrop" class="hidden"></div>
    <aside id="side">
      <button id="sideClose" class="ghost" title="Fechar menu">✕</button>
      <button id="newSess">＋ Nova sessão</button>
      <div class="link" id="searchBtn">🔎 buscar entre sessões</div>
      <div class="sec">Recentes</div>
      <div id="recents"></div>
      <button id="moreBtn" class="ghost hidden">Mostrar mais</button>
      <div class="sec">Arquivos & imagens</div>
      <div id="files"></div>
      <div class="spacer"></div>
      <button id="settingsBtn" class="ghost">⚙ Configurações</button>
    </aside>
    <main>
      <header>
        <button id="menuBtn" class="ghost">☰</button>
        <span class="dot" id="dot"></span>
        <span id="title">Jarvis</span>
      </header>
      <div id="limit" class="hidden"></div>
      <div id="roBanner" class="hidden">👁 Sessão nativa (somente leitura no Jarvis)</div>
      <div id="log"></div>
      <form id="composer">
        <div id="attachRow"></div>
        <textarea id="input" rows="1" placeholder="Fale ou digite…" autocomplete="off"></textarea>
        <div class="controls">
          <div class="ctlpills">
            <button type="button" id="attach" class="ghost" title="Anexar">＋</button>
            <button type="button" id="mic" class="ghost" title="Falar">🎤</button>
            <span id="status"></span>
            <span class="spacer"></span>
            <button type="button" id="agentBtn" class="pill" title="Agente / IA">🤖 <span class="cap" id="agentName">—</span></button>
            <button type="button" id="cwdBtn" class="pill" title="Pasta de trabalho">📁 <span class="cap" id="cwdName">—</span></button>
            <button type="button" id="modelBtn" class="pill" title="Modelo"><span class="cap" id="modelName">—</span></button>
            <button type="button" id="effortBtn" class="pill" title="Esforço / capacidade">⚡ <span class="cap" id="effortName">—</span></button>
            <button type="button" id="speak" class="ghost" title="Falar respostas (voz)">🔇</button>
          </div>
          <button type="submit" id="sendBtn">Enviar</button>
        </div>
        <span class="usage" id="usage"></span>
      </form>
    </main>
  </div>

  <!-- floating popover for the footer pills (agent / folder / model / effort) -->
  <div id="pop" class="pop hidden"></div>

  <!-- generic dialog (replaces native alert/confirm/prompt) -->
  <div id="dlg" class="modal hidden"><div class="card">
    <b id="dlgTitle"></b>
    <input id="dlgInput" type="text" class="hidden" autocomplete="off">
    <div class="row" style="justify-content:flex-end"><button id="dlgCancel" class="ghost" type="button">Cancelar</button><button id="dlgOk" type="button">OK</button></div>
  </div></div>

  <div id="searchModal" class="modal hidden"><div class="card">
    <b>🔎 Buscar entre sessões</b>
    <input id="searchInput" type="text" placeholder="Ex.: como está o progresso da sessão de SLA?" autocomplete="off">
    <div id="searchResults"></div>
    <div class="row"><button id="searchGo">Buscar</button><button id="searchClose" class="ghost">Fechar</button></div>
  </div></div>

  <div id="settings" class="modal hidden"><div class="card">
    <b>Configurações</b>
    <div class="sec">Padrões</div>
    <label>Agente padrão <select id="setAgent"></select></label>
    <label>Modelo padrão <select id="setModel"></select></label>
    <label>Esforço padrão <select id="setEffort"></select></label>
    <div class="sec">Voz</div>
    <label class="row"><input type="checkbox" id="setVoice"> Falar as respostas por padrão</label>
    <label class="row"><input type="checkbox" id="setContinue"> Após responder, continuar escutando follow-up</label>
    <label>Janela de escuta de continuação (segundos)<input type="number" id="setContinueSec" min="5" max="120" step="5"></label>
    <div class="sec">Escuta avançada <span class="soon">em desenvolvimento</span></div>
    <label class="row"><input type="checkbox" id="setWake"> Wake word "Hey Jarvis" (na máquina) <span class="soon">requer wake_listener.py</span></label>
    <label class="row"><input type="checkbox" id="setNoise"> Filtro anti-ruído / detecção de fala (VAD)</label>
    <div class="sec">Identificação de voz (multiusuário)</div>
    <label class="row"><input type="checkbox" id="setGate"> Exigir voz cadastrada (bloquear vozes desconhecidas)</label>
    <div id="spkList" class="mut" style="font-size:12px;margin:4px 0"></div>
    <div class="row"><button id="setEnroll" class="ghost" type="button">🎙 Cadastrar / atualizar minha voz</button></div>
    <div class="row" style="justify-content:flex-end;margin-top:4px"><button id="setCancel" class="ghost" type="button">Fechar</button><button id="setClose" type="button">Salvar</button></div>
  </div></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const E = ['log','dot','title','roBanner','agentBtn','agentName','cwdBtn','cwdName','modelBtn','modelName','effortBtn','effortName','pop','speak','recents','moreBtn','files',
      'newSess','searchBtn','searchModal','searchInput','searchResults','searchGo','searchClose','settingsBtn','settings','setAgent','setModel','setEffort','setVoice','setContinue','setContinueSec',
      'setWake','setNoise','setGate','spkList','setEnroll','setCancel','setClose','composer','input','mic','attach','file','attachRow','usage','limit','sendBtn',
      'dlg','dlgTitle','dlgInput','dlgOk','dlgCancel','menuBtn','side','sideClose','backdrop','status'].reduce((o,k)=>(o[k]=$(k),o),{});
    // hidden file input (created dynamically)
    E.file = document.createElement('input'); E.file.type='file'; E.file.multiple=true; E.file.style.display='none'; document.body.appendChild(E.file);

    let ws, currentSession=null, currentAgent=null, caps=[], sessions=[], shown=8, attachments=[], browsePath='', recentDirs=[], curNative=false;
    const isNative = id => typeof id==='string' && (id.startsWith('claude:')||id.startsWith('codex:'));
    const agentIcon = a => a==='codex'?'🟢':a==='claude-code'?'🟣':a==='mock'?'⚪':'🔹';
    // ---- config (persisted; refresh não perde estado) ----
    const cfg = Object.assign({ voice:false, continue:false, continueSec:30, wake:false, noise:true, voiceGate:false, lastCwd:'' }, JSON.parse(localStorage.getItem('jarvis')||'{}'));
    const saveCfg = () => localStorage.setItem('jarvis', JSON.stringify(cfg));
    let speak = cfg.voice, speakers = [];

    // ---------- markdown ----------
    const esc = s => s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    function inl(s){ return s.replace(/!\[([^\]]*)\]\(([^)\s]+)[^)]*\)/g,(_,a,u)=>`<img alt="${a}" src="${u}">`)
      .replace(/\[([^\]]+)\]\(([^)\s]+)[^)]*\)/g,(_,t,u)=>`<a href="${u}" target="_blank" rel="noopener">${t}</a>`)
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*\*([^*]+)\*\*\*/g,'<strong><em>$1</em></strong>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
      .replace(/~~([^~]+)~~/g,'<del>$1</del>'); }
    function tableHtml(rows){ const cells=r=>r.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>inl(esc(c.trim())));
      const head=cells(rows[0]),body=rows.slice(2).map(cells); return `<table><thead><tr>${head.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`; }
    function md(text){ const codes=[]; text=text.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>{codes.push(c);return ` C${codes.length-1} `;});
      const L=text.split(/\r?\n/); let h='',i=0,m; while(i<L.length){ const line=L[i];
        if(m=line.match(/^ C(\d+) $/)){ h+=`<pre><button type="button" class="copy ghost">copiar</button><code>${esc(codes[+m[1]])}</code></pre>`; i++; continue; }
        if(/\|/.test(line)&&i+1<L.length&&/^\s*\|?[\s:|-]+\|/.test(L[i+1])){ const r=[]; while(i<L.length&&/\|/.test(L[i])){r.push(L[i]);i++;} h+=tableHtml(r); continue; }
        if(m=line.match(/^\s*(#{1,6})\s+(.*)/)){ h+=`<h4>${inl(esc(m[2]))}</h4>`; i++; continue; }
        if(/^\s*>\s?/.test(line)){ h+=`<blockquote>${inl(esc(line.replace(/^\s*>\s?/,'')))}</blockquote>`; i++; continue; }
        if(/^\s*([-*_]\s*){3,}$/.test(line)){ h+='<hr>'; i++; continue; }
        if(/^\s*[-*+]\s+/.test(line)){ const it=[]; while(i<L.length&&/^\s*[-*+]\s+/.test(L[i])){it.push(inl(esc(L[i].replace(/^\s*[-*+]\s+/,''))).replace(/^\[([ xX])\]\s+/,(_,c)=>/x/i.test(c)?'☑ ':'☐ '));i++;} h+=`<ul>${it.map(x=>`<li>${x}</li>`).join('')}</ul>`; continue; }
        if(/^\s*\d+[.)]\s+/.test(line)){ const it=[]; while(i<L.length&&/^\s*\d+[.)]\s+/.test(L[i])){it.push(inl(esc(L[i].replace(/^\s*\d+[.)]\s+/,''))));i++;} h+=`<ol>${it.map(x=>`<li>${x}</li>`).join('')}</ol>`; continue; }
        if(line.trim()===''){ i++; continue; } h+=`<p>${inl(esc(line))}</p>`; i++; } return h; }
    function buildMsgEl(m){ const d=document.createElement('div'); if(m.role==='user'){ d.className='msg me';
        if(m.speaker){ const s=document.createElement('span'); s.textContent='🗣 '+m.speaker; s.style.cssText='display:block;font-size:11px;opacity:.7;margin-bottom:2px'; d.appendChild(s); }
        d.appendChild(document.createTextNode(m.text)); } else { d.className='msg bot'; d.innerHTML=md(m.text); } return d; }
    function addMsg(m){ const d=buildMsgEl(m); if(pendingEl) E.log.insertBefore(d,pendingEl); else E.log.appendChild(d); E.log.scrollTop=E.log.scrollHeight; }
    function note(t){ const d=document.createElement('div'); d.className='msg bot'; d.textContent=t; E.log.appendChild(d); E.log.scrollTop=E.log.scrollHeight; }
    // "processando…" indicator so the user knows a request is in flight
    let pendingEl=null;
    function showPending(){ if(pendingEl)return; pendingEl=document.createElement('div'); pendingEl.className='msg bot pending'; pendingEl.innerHTML='<span class="typing"><i></i><i></i><i></i></span>'; E.log.appendChild(pendingEl); E.log.scrollTop=E.log.scrollHeight; }
    function clearPending(){ if(pendingEl){ pendingEl.remove(); pendingEl=null; } }
    function addErr(t){ const d=document.createElement('div'); d.className='msg err'; d.textContent=t; E.log.appendChild(d); }
    function searchCardHtml(m){ let h='<b>🔎 '+esc(m.query)+'</b>'+md(m.answer||'');
      (m.matches||[]).forEach(x=>{ h+=`<div class="match" data-id="${esc(x.id)}">📂 <b>${esc(x.title||x.id)}</b> <span class="chip">${esc(x.agent||'')}</span>`+
        (x.why||x.progress?`<br><span class="mut">${esc(x.why||x.progress||'')}</span>`:'')+
        (m.action?`<br><button type="button" class="exec ghost" data-id="${esc(x.id)}" data-action="${esc(m.action)}">▶ executar ação</button>`:'')+`</div>`; });
      return h; }
    function addSearchCard(m){ const d=document.createElement('div'); d.className='msg bot'; d.innerHTML=searchCardHtml(m); E.log.appendChild(d); E.log.scrollTop=E.log.scrollHeight; if(m.audio) playTTS(m.audio); }
    function renderSearchInto(c,m){ c.innerHTML=searchCardHtml(m); if(m.audio) playTTS(m.audio); }
    function refreshFiles(msgs){ E.files.innerHTML=''; const f=[]; msgs.forEach(m=>{ if(m.role!=='assistant')return; const t=m.text;
      (t.match(/!\[[^\]]*\]/g)||[]).forEach(x=>f.push('🖼 '+(x.match(/!\[([^\]]*)\]/)?.[1]||'imagem')));
      (t.match(/\b[\w./-]+\.(ts|tsx|js|py|json|md|html|css|yml|yaml|sh)\b/g)||[]).forEach(x=>f.push('📄 '+x)); });
      [...new Set(f)].slice(0,25).forEach(x=>{ const d=document.createElement('div'); d.className='item'; d.textContent=x; E.files.appendChild(d); }); }

    function renderRecents(){ E.recents.innerHTML=''; sessions.slice(0,shown).forEach(s=>{ const d=document.createElement('div'); d.className='item'+(s.id===currentSession?' active':'');
      const nat=isNative(s.id);
      d.innerHTML=`<span class="rbadge" title="${esc(s.agent||'')}">${agentIcon(s.agent)}</span><span class="rtitle">${esc(s.title||'Sessão')}</span>`+(nat?'<span class="rnat">nativo</span>':'');
      d.title=`${s.agent||''}${nat?' · nativo (somente leitura)':''}\n${s.cwd||''}`; d.onclick=()=>{ tx({t:'open',sessionId:s.id}); closeSide(); }; E.recents.appendChild(d); });
      E.moreBtn.classList.toggle('hidden', sessions.length<=shown); }
    E.moreBtn.onclick=()=>{ shown+=10; renderRecents(); };

    const capsFor = n => caps.find(c=>c.name===n)||{models:[],defaultModel:null};
    function fillSel(sel,items,val){ sel.innerHTML=''; items.forEach(x=>{const o=document.createElement('option'); const isStr=typeof x==='string'; o.value=isStr?x:x.id; o.textContent=isStr?x:(x.label||x.id); if(o.value===val)o.selected=true; sel.appendChild(o);}); sel.classList.toggle('hidden',!items.length); }
    const modelObj=(agent,id)=>{ const ms=capsFor(agent).models; return ms.find(m=>m.id===id)||ms[0]; };
    function fillEfforts(effSel,agent,modelId,val){ const m=modelObj(agent,modelId); const efs=(m&&m.efforts)||[]; fillSel(effSel,efs, (efs.includes(val)&&val)||(m&&m.defaultEffort)||efs[0]); }
    // footer pill state: model/effort vary per-message; agent/folder lock once the session starts
    let curModel=null, curEffort=null, curCwd='', curStarted=false;
    const modelLabel=(agent,id)=>{ const m=modelObj(agent,id); return m?(m.label||m.id):(id||'—'); };
    const effortsFor=(agent,id)=>{ const m=modelObj(agent,id); return (m&&m.efforts)||[]; };
    const EFF_PT={minimal:'Mínimo',low:'Baixo',medium:'Médio',high:'Alto',xhigh:'Muito alto',max:'Máximo',ultra:'Ultra',ultracode:'Ultracode'};
    const effLabel=v=>v?(EFF_PT[v]||v):'—';
    const base = p => (p||'').replace(/[\\/]$/,'').split(/[\\/]/).pop()||p;
    function syncModelEffort(){ const c=capsFor(currentAgent);
      curModel=(cfg.model&&c.models.some(m=>m.id===cfg.model))?cfg.model:(c.defaultModel||(c.models[0]||{}).id||null);
      const efs=effortsFor(currentAgent,curModel);
      curEffort=(cfg.effort&&efs.includes(cfg.effort))?cfg.effort:((modelObj(currentAgent,curModel)||{}).defaultEffort||efs[efs.length-1]||null);
      renderControls(); }
    function renderControls(){
      E.agentName.textContent=currentAgent||'—';
      E.cwdName.textContent=base(curCwd)||'—';
      E.modelName.textContent=modelLabel(currentAgent,curModel);
      E.effortName.textContent=effLabel(curEffort);
      E.agentBtn.classList.toggle('lock',curStarted||curNative); E.cwdBtn.classList.toggle('lock',curStarted||curNative);
      E.modelBtn.classList.remove('lock'); E.effortBtn.classList.remove('lock'); // modelo/esforço: sempre trocáveis (por mensagem)
      E.agentBtn.title=(curStarted||curNative)?'Agente (travado)':'Agente / IA — clique para trocar (só em sessão nova)';
      E.cwdBtn.title=(curStarted||curNative)?((curCwd||'')+' — travada'):((curCwd||'')+' — clique para escolher (só em sessão nova)'); }

    // ---------- new session ----------
    E.newSess.onclick=()=>{ // cria sessão vazia (agente/pasta ajustáveis pelos pills até a 1ª msg)
      const agent=cfg.agent||currentAgent||(caps[0]||{}).name; const cwd=cfg.lastCwd||''; tx({t:'new',agent,cwd}); closeSide(); };

    // ---------- search (input com foco imediato; sem prompt) ----------
    E.searchBtn.onclick=()=>openSearch();
    function openSearch(){ E.searchResults.innerHTML=''; E.searchInput.value=''; E.searchModal.classList.remove('hidden'); closeSide(); setTimeout(()=>E.searchInput.focus(),30); }
    function runSearch(){ const q=E.searchInput.value.trim(); if(!q)return; E.searchResults.innerHTML='<div class="mut">Buscando…</div>'; tx({t:'search',query:q,speak}); }
    E.searchGo.onclick=runSearch;
    E.searchClose.onclick=()=>E.searchModal.classList.add('hidden');
    E.searchInput.onkeydown=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); runSearch(); } };
    E.searchResults.addEventListener('click',(e)=>{
      const exec=e.target.closest('.exec'); if(exec){ e.stopPropagation(); tx({t:'sendTo',sessionId:exec.dataset.id,text:exec.dataset.action,speak,model:curModel,effort:curEffort}); tx({t:'open',sessionId:exec.dataset.id}); E.searchModal.classList.add('hidden'); return; }
      const match=e.target.closest('.match'); if(match){ tx({t:'open',sessionId:match.dataset.id}); E.searchModal.classList.add('hidden'); } });

    // ---------- footer popovers (pills clicáveis) ----------
    let popMode=null;
    function closePop(){ E.pop.classList.add('hidden'); E.pop.innerHTML=''; E.pop._anchor=null; popMode=null; }
    function openPop(anchor,build){ closePop(); build(E.pop); E.pop.classList.remove('hidden'); E.pop._anchor=anchor;
      const r=anchor.getBoundingClientRect(), pr=E.pop.getBoundingClientRect();
      const left=Math.max(8,Math.min(r.left, innerWidth-pr.width-8)); let top=r.top-pr.height-8; if(top<8) top=r.bottom+8;
      E.pop.style.left=left+'px'; E.pop.style.top=top+'px'; }
    function togglePop(anchor,build){ if(!E.pop.classList.contains('hidden') && E.pop._anchor===anchor) closePop(); else openPop(anchor,build); }
    document.addEventListener('click',(e)=>{ if(E.pop.classList.contains('hidden'))return; if(E.pop.contains(e.target)||e.target.closest('.pill'))return; closePop(); });
    document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closePop(); });
    const ph=(t)=>{ const d=document.createElement('div'); d.className='ph'; d.textContent=t; return d; };

    function buildAgentPop(p){ p.appendChild(ph('Agente / IA')); caps.forEach(c=>{ const o=document.createElement('div'); o.className='opt'+(c.name===currentAgent?' sel':'');
      o.innerHTML='🤖 '+esc(c.name)+(c.name===currentAgent?'<span class="r">atual</span>':'');
      o.onclick=()=>{ closePop(); if(c.name!==currentAgent) tx({t:'configure',sessionId:currentSession,agent:c.name}); }; p.appendChild(o); }); }

    function buildModelPop(p){ const c=capsFor(currentAgent); p.appendChild(ph('Modelo')); (c.models||[]).forEach(mm=>{ const o=document.createElement('div'); o.className='opt'+(mm.id===curModel?' sel':'');
      o.innerHTML=esc(mm.label||mm.id)+(mm.id===curModel?'<span class="r">atual</span>':'');
      o.onclick=()=>{ closePop(); curModel=mm.id; cfg.model=mm.id; const efs=effortsFor(currentAgent,mm.id); if(!efs.includes(curEffort)) curEffort=((modelObj(currentAgent,mm.id)||{}).defaultEffort||efs[efs.length-1]||null); cfg.effort=curEffort; saveCfg(); renderControls(); }; p.appendChild(o); }); }

    function buildEffortPop(p){ const efs=effortsFor(currentAgent,curModel); p.appendChild(ph('Esforço · '+(currentAgent||'')));
      if(!efs.length){ const d=document.createElement('div'); d.className='mut'; d.textContent='sem níveis para este modelo'; p.appendChild(d); return; }
      const lbl=document.createElement('div'); lbl.className='slbl'; lbl.innerHTML='<span>Mais rápido</span><span>Mais inteligente</span>'; p.appendChild(lbl);
      const rng=document.createElement('input'); rng.type='range'; rng.min=0; rng.max=efs.length-1; rng.step=1; let idx=efs.indexOf(curEffort); if(idx<0) idx=efs.length-1; rng.value=idx; p.appendChild(rng);
      const val=document.createElement('div'); val.className='sval'; val.textContent=effLabel(efs[idx]); p.appendChild(val);
      rng.oninput=()=>{ val.textContent=effLabel(efs[+rng.value]); };
      rng.onchange=()=>{ curEffort=efs[+rng.value]; cfg.effort=curEffort; saveCfg(); renderControls(); }; }

    function buildFolderPop(p){ popMode='folder'; p.appendChild(ph('Pasta de trabalho'));
      if(recentDirs.length){ p.appendChild(ph('Recentes')); const rl=document.createElement('div'); rl.className='flist'; rl.style.maxHeight='140px'; rl.style.marginBottom='8px';
        recentDirs.forEach(d=>{ const it=document.createElement('div'); it.textContent='🕘 '+base(d); it.title=d; it.onclick=()=>{ closePop(); tx({t:'configure',sessionId:currentSession,cwd:d}); }; rl.appendChild(it); }); p.appendChild(rl); p.appendChild(ph('Navegar')); }
      const path=document.createElement('div'); path.className='fpath'; path.id='popPath'; path.textContent='carregando…'; p.appendChild(path);
      const list=document.createElement('div'); list.className='flist'; list.id='popList'; list.style.height='190px'; p.appendChild(list);
      const row=document.createElement('div'); row.className='frow';
      const up=document.createElement('button'); up.className='ghost'; up.id='popUp'; up.textContent='⬆ acima'; up.onclick=()=>tx({t:'listdir',path:up.dataset.parent||''});
      const use=document.createElement('button'); use.id='popUse'; use.textContent='Usar esta pasta'; use.onclick=()=>{ const b=browsePath; closePop(); tx({t:'configure',sessionId:currentSession,cwd:b}); };
      row.appendChild(up); row.appendChild(use); p.appendChild(row);
      tx({t:'listdir',path:curCwd||cfg.lastCwd||''}); }

    E.agentBtn.onclick=()=>{ if(curStarted||curNative)return; togglePop(E.agentBtn,buildAgentPop); };
    E.cwdBtn.onclick=()=>{ if(curStarted||curNative)return; togglePop(E.cwdBtn,buildFolderPop); };
    E.modelBtn.onclick=()=>togglePop(E.modelBtn,buildModelPop);
    E.effortBtn.onclick=()=>togglePop(E.effortBtn,buildEffortPop);

    // ---------- settings (persistente) ----------
    E.settingsBtn.onclick=()=>{ fillSel(E.setAgent,caps.map(c=>c.name),cfg.agent||currentAgent); const c=capsFor(E.setAgent.value);
      fillSel(E.setModel,c.models,cfg.model||c.defaultModel); fillEfforts(E.setEffort,E.setAgent.value,E.setModel.value,cfg.effort);
      E.setVoice.checked=cfg.voice; E.setContinue.checked=cfg.continue; E.setContinueSec.value=cfg.continueSec; E.setWake.checked=cfg.wake; E.setNoise.checked=cfg.noise; E.setGate.checked=cfg.voiceGate; renderSpk(); tx({t:'speakers'});
      E.settings.classList.remove('hidden'); };
    E.setAgent.onchange=()=>{ const c=capsFor(E.setAgent.value); fillSel(E.setModel,c.models,c.defaultModel); fillEfforts(E.setEffort,E.setAgent.value,E.setModel.value); };
    E.setModel.onchange=()=>fillEfforts(E.setEffort,E.setAgent.value,E.setModel.value);
    E.setEnroll.onclick=()=>enrollFlow();
    E.setClose.onclick=()=>{
      if(E.setGate.checked && !speakers.length){ addErr('Cadastre sua voz antes de exigir voz cadastrada (senão o modo voz fica bloqueado).'); E.setGate.checked=false; }
      Object.assign(cfg,{agent:E.setAgent.value,model:E.setModel.value,effort:E.setEffort.value,voice:E.setVoice.checked,
      continue:E.setContinue.checked,continueSec:+E.setContinueSec.value||30,wake:E.setWake.checked,noise:E.setNoise.checked,voiceGate:E.setGate.checked});
      saveCfg(); speak=cfg.voice; setSpeakBtn(); tx({t:'wake',enabled:cfg.wake}); tx({t:'voicecfg',gate:cfg.voiceGate}); E.settings.classList.add('hidden'); };
    E.setCancel.onclick=()=>E.settings.classList.add('hidden'); // fecha sem salvar

    // ---------- generic dialog (substitui alert/confirm/prompt nativos) ----------
    let dlgResolve=null;
    function dialog({title,input=false,placeholder='',value='',okText='OK',cancelText='Cancelar',danger=false}){
      return new Promise(res=>{ dlgResolve=res; E.dlgTitle.textContent=title; E.dlgInput.classList.toggle('hidden',!input); E.dlgInput.value=value; E.dlgInput.placeholder=placeholder;
        E.dlgOk.textContent=okText; E.dlgCancel.textContent=cancelText; E.dlgOk.classList.toggle('danger',!!danger); E.dlg.classList.remove('hidden');
        if(input) setTimeout(()=>{E.dlgInput.focus();E.dlgInput.select();},30); }); }
    function dlgClose(val){ E.dlg.classList.add('hidden'); const r=dlgResolve; dlgResolve=null; if(r) r(val); }
    E.dlgOk.onclick=()=>dlgClose(E.dlgInput.classList.contains('hidden')?true:E.dlgInput.value.trim());
    E.dlgCancel.onclick=()=>dlgClose(null);
    E.dlgInput.onkeydown=(e)=>{ if(e.key==='Enter'){e.preventDefault();E.dlgOk.click();} else if(e.key==='Escape'){e.preventDefault();E.dlgCancel.click();} };
    // ---------- voice enrollment / speaker list ----------
    function renderSpk(){ if(!E.spkList)return; E.spkList.innerHTML = speakers.length ? 'Vozes cadastradas: ' : 'Nenhuma voz cadastrada ainda.';
      speakers.forEach(n=>{ const c=document.createElement('span'); c.className='chip'; c.textContent='🗣 '+n+' ✕'; c.style.cursor='pointer';
        c.onclick=async()=>{ if(await dialog({title:`Remover a voz "${n}"?`,okText:'Remover',danger:true})) tx({t:'delspk',name:n}); }; E.spkList.appendChild(c); }); }
    function recordClip(ms){ return new Promise((res,rej)=>{ navigator.mediaDevices.getUserMedia({audio:{noiseSuppression:cfg.noise,echoCancellation:true,autoGainControl:true}})
      .then(st=>{ const r=new MediaRecorder(st),ch=[]; r.ondataavailable=e=>ch.push(e.data);
        r.onstop=()=>{ st.getTracks().forEach(t=>t.stop()); const fr=new FileReader(); fr.onload=()=>res(fr.result.split(',')[1]); fr.readAsDataURL(new Blob(ch,{type:'audio/webm'})); };
        r.start(); setTimeout(()=>r.stop(), ms); }).catch(rej); }); }
    async function enrollFlow(){ const name=(await dialog({title:'Seu nome para identificação de voz:',input:true,placeholder:'ex.: Jonathan',okText:'Continuar'})||'').trim(); if(!name)return;
      const N=3, samples=[]; for(let i=0;i<N;i++){ status('listening',`Cadastro ${i+1}/${N}: fale uma frase (3s)…`);
        try{ samples.push(await recordClip(3000)); }catch(e){ addErr('mic erro: '+e.message); status(''); return; }
        status(''); await new Promise(r=>setTimeout(r,500)); }
      note('Enviando cadastro de voz de "'+name+'"…'); tx({t:'enroll',name,samples,ext:'webm'}); }

    // ---------- status indicator ----------
    function status(mode,txt){ E.status.className=mode||''; E.status.innerHTML = mode ? `<span class="pulse"></span>${txt}` : ''; }
    function setSpeakBtn(){ E.speak.classList.toggle('on',speak); E.speak.textContent=speak?'🔊':'🔇'; }

    // ---------- ws ----------
    function tx(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
    let reconnectT=null;
    function scheduleReconnect(){ if(reconnectT)return; reconnectT=setTimeout(()=>{ reconnectT=null; connect(); },1200); }
    function connect(){ ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);
      ws.onopen=()=>{ E.dot.classList.add('on'); tx({t:'wake',enabled:cfg.wake}); if(currentSession) tx({t:'open',sessionId:currentSession}); }; // re-inscreve p/ voltar a receber ao vivo
      ws.onclose=()=>{ E.dot.classList.remove('on'); scheduleReconnect(); };
      ws.onmessage=(e)=>{ const m=JSON.parse(e.data);
        if(m.t==='hello'){ caps=m.agents||[]; if(!cfg.agent){cfg.agent=m.default;saveCfg();} }
        else if(m.t==='dirs'){ browsePath=m.path; if(popMode==='folder'){ const path=document.getElementById('popPath'),list=document.getElementById('popList'),up=document.getElementById('popUp');
          if(path){ path.textContent=m.path; if(up) up.dataset.parent=m.parent||''; list.innerHTML=''; (m.entries||[]).forEach(name=>{ const d=document.createElement('div'); d.textContent='📁 '+name; d.onclick=()=>tx({t:'listdir',path:m.path.replace(/[\\/]$/,'')+(m.path.includes('\\')?'\\':'/')+name}); list.appendChild(d); }); } } }
        else if(m.t==='sessions'){ sessions=m.sessions||[]; recentDirs=m.recentDirs||recentDirs; renderRecents(); if(!currentSession){ const own=sessions.find(s=>!isNative(s.id)); if(own) tx({t:'open',sessionId:own.id}); else E.newSess.onclick(); } }
        else if(m.t==='history'){ currentSession=m.sessionId; currentAgent=(m.session||{}).agent||caps[0]?.name; curCwd=(m.session||{}).cwd||''; curNative=!!(m.session||{}).native;
          if(curCwd && !curNative){cfg.lastCwd=curCwd;saveCfg();} curStarted=(m.messages||[]).length>0;
          E.title.textContent=(m.session||{}).title||'Sessão'; syncModelEffort(); clearPending(); E.log.innerHTML='';
          const msgs=m.messages||[], frag=document.createDocumentFragment(); // render em lote (1 reflow) — leve no mobile
          if(m.total&&m.total>msgs.length){ const n=document.createElement('div'); n.className='msg err'; n.textContent=`— mostrando as últimas ${msgs.length} de ${m.total} mensagens —`; frag.appendChild(n); }
          msgs.forEach(mm=>frag.appendChild(buildMsgEl(mm))); E.log.appendChild(frag); E.log.scrollTop=E.log.scrollHeight;
          refreshFiles(msgs); renderRecents(); closePop();
          E.roBanner.classList.toggle('hidden',!curNative); E.input.disabled=curNative; E.sendBtn.disabled=curNative; E.mic.disabled=curNative; E.input.placeholder=curNative?'Sessão nativa — somente leitura':'Fale ou digite…'; }
        else if(m.t==='message'){ if(m.message.sessionId===currentSession){ if(m.message.role==='assistant') clearPending(); addMsg(m.message); if(m.message.role==='user'&&!curStarted){ curStarted=true; renderControls(); } } }
        else if(m.t==='usage'){ if(m.sessionId===currentSession&&m.usage) E.usage.textContent=`custo ~$${(m.usage.costUsd||0).toFixed(4)} · ${m.usage.outputTokens||0} tokens`; }
        else if(m.t==='tts'){ if(m.sessionId===currentSession) playTTS(m.audio); }
        else if(m.t==='searchResult'){ clearPending(); if(!E.searchModal.classList.contains('hidden')) renderSearchInto(E.searchResults,m); else addSearchCard(m); }
        else if(m.t==='wake_state'){ cfg.wake=m.enabled; saveCfg(); if(E.setWake) E.setWake.checked=m.enabled; }
        else if(m.t==='wake_event'){ status('listening', m.phase==='capturing'?'Jarvis ouvindo…':'Jarvis'); }
        else if(m.t==='voice_state'){ speakers=m.speakers||[]; cfg.voiceGate=!!m.gate; saveCfg(); if(E.setGate)E.setGate.checked=cfg.voiceGate; renderSpk(); }
        else if(m.t==='enrolled'){ note('✓ Voz cadastrada: '+m.name+' ('+m.samples+' amostras).'); }
        else if(m.t==='error'){ clearPending(); addErr('erro: '+m.message); if(m.limit){ E.limit.textContent='⚠ Limite de uso atingido: '+m.message; E.limit.classList.remove('hidden'); } } };
    }
    function playTTS(b64){ const b=atob(b64),u=new Uint8Array(b.length); for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);
      const a=new Audio(URL.createObjectURL(new Blob([u],{type:'audio/wav'}))); status('speaking','Jarvis falando…');
      a.onended=()=>{ status(''); if(cfg.continue && !recording) startRec(true); }; a.play().catch(()=>status('')); }

    // ---------- mic (manual + continuação, com checagem simples de fala/ruído) ----------
    let rec=null,chunks=[],recording=false,contTimer=null;
    async function startRec(auto){ if(recording) return;
      try{ const st=await navigator.mediaDevices.getUserMedia({audio:{noiseSuppression:cfg.noise,echoCancellation:true,autoGainControl:true}}); rec=new MediaRecorder(st); chunks=[]; recording=true;
        // detector simples de fala (pico de amplitude) p/ anti-ruído / descartar silêncio
        const ac=new AudioContext(); const src=ac.createMediaStreamSource(st); const an=ac.createAnalyser(); an.fftSize=512; src.connect(an);
        const buf=new Uint8Array(an.fftSize); let peak=0; const poll=setInterval(()=>{ an.getByteTimeDomainData(buf); let mx=0; for(const v of buf) mx=Math.max(mx,Math.abs(v-128)); peak=Math.max(peak,mx); },100);
        rec.ondataavailable=(e)=>chunks.push(e.data);
        rec.onstop=async()=>{ clearInterval(poll); clearTimeout(contTimer); ac.close(); st.getTracks().forEach(t=>t.stop()); recording=false; E.mic.classList.remove('on'); E.mic.textContent='🎤'; status('');
          const spoke = !cfg.noise || peak>8; // limiar simples de fala
          if(auto && !spoke) return; // continuação: silêncio -> ignora
          const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result.split(',')[1]);fr.readAsDataURL(new Blob(chunks,{type:'audio/webm'}));});
          tx({t:'voice',audio:b64,ext:'webm',speak,model:curModel,effort:curEffort,sessionId:currentSession}); showPending(); };
        rec.start(); E.mic.classList.add('on'); E.mic.textContent='⏺'; status('listening', auto?`escutando follow-up… (${cfg.continueSec}s)`:'escutando…');
        if(auto) contTimer=setTimeout(()=>{ if(recording) rec.stop(); }, cfg.continueSec*1000);
      }catch(e){ addErr('mic erro: '+e.message); recording=false; } }
    E.mic.onclick=()=>{ if(recording){ rec.stop(); } else startRec(false); };

    // ---------- composer / misc ----------
    E.speak.onclick=()=>{ speak=!speak; cfg.voice=speak; saveCfg(); setSpeakBtn(); };
    function setSide(o){ E.side.classList.toggle('open',o); E.backdrop.classList.toggle('hidden',!o); }
    const closeSide=()=>setSide(false);
    E.menuBtn.onclick=()=>setSide(!E.side.classList.contains('open'));
    E.backdrop.onclick=closeSide; E.sideClose.onclick=closeSide;
    E.log.addEventListener('click',(e)=>{
      if(e.target.classList.contains('copy')){ navigator.clipboard.writeText(e.target.nextElementSibling.textContent); e.target.textContent='copiado'; setTimeout(()=>e.target.textContent='copiar',1200); return; }
      const exec=e.target.closest('.exec'); if(exec){ e.stopPropagation(); tx({t:'sendTo',sessionId:exec.dataset.id,text:exec.dataset.action,speak,model:curModel,effort:curEffort}); tx({t:'open',sessionId:exec.dataset.id}); return; }
      const match=e.target.closest('.match'); if(match){ tx({t:'open',sessionId:match.dataset.id}); }
    });
    E.attach.onclick=()=>E.file.click();
    E.file.onchange=async()=>{ for(const f of E.file.files){ attachments.push({name:f.name,content:await f.text()}); } E.file.value=''; renderAttach(); };
    function renderAttach(){ E.attachRow.innerHTML=''; attachments.forEach((a,i)=>{ const c=document.createElement('span'); c.className='chip'; c.textContent='📎 '+a.name+' ✕'; c.onclick=()=>{attachments.splice(i,1);renderAttach();}; E.attachRow.appendChild(c); }); }
    E.composer.onsubmit=(e)=>{ e.preventDefault(); if(curNative)return; const text=E.input.value.trim(); if(!text&&!attachments.length)return;
      tx({t:'send',text:text||'(anexo)',speak,model:curModel,effort:curEffort,sessionId:currentSession,attachments}); showPending();
      E.input.value=''; E.input.style.height='auto'; attachments=[]; renderAttach(); };
    E.input.oninput=()=>{ E.input.style.height='auto'; E.input.style.height=E.input.scrollHeight+'px'; };
    E.input.onkeydown=(e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); E.composer.requestSubmit(); } };
    // mobile: o WS costuma cair em background — ao voltar pra aba, reconecta (onopen re-inscreve + recupera)
    document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible' && (!ws||ws.readyState>1)){ if(reconnectT){clearTimeout(reconnectT);reconnectT=null;} connect(); } });
    setSpeakBtn(); connect();
  </script>
</body>
</html>
