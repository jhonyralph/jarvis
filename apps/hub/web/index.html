<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Jarvis</title>
  <style>
    :root { color-scheme: light dark; --bg:#0b0d10; --panel:#14181d; --me:#2563eb; --bot:#232a31; --text:#e6e9ec; --mut:#8b98a5; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.45 system-ui,sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; }
    header { padding:10px 12px; border-bottom:1px solid #ffffff14; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    header .dot { width:9px;height:9px;border-radius:50%;background:#f43f5e; flex:none; }
    header .dot.on { background:#22c55e; }
    header select, header button.ghost { background:var(--panel); color:var(--text); border:1px solid #ffffff1f; border-radius:10px; padding:7px 9px; font:inherit; font-size:13px; cursor:pointer; }
    #sessSel { flex:1; min-width:130px; }
    #log { flex:1; overflow:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
    .msg { max-width:min(85%,680px); padding:9px 13px; border-radius:14px; white-space:pre-wrap; word-wrap:break-word; }
    .me { align-self:flex-end; background:var(--me); }
    .bot { align-self:flex-start; background:var(--bot); }
    .err { align-self:center; color:#fca5a5; font-size:13px; }
    form { display:flex; gap:8px; padding:12px; border-top:1px solid #ffffff14; }
    textarea { flex:1; resize:none; background:var(--panel); color:var(--text); border:1px solid #ffffff1f; border-radius:12px; padding:10px 12px; font:inherit; max-height:120px; }
    button { border:0; border-radius:12px; padding:0 16px; background:var(--me); color:#fff; font:inherit; font-weight:600; cursor:pointer; }
    button.ghost { background:var(--panel); color:var(--text); border:1px solid #ffffff1f; }
    button.on { background:#22c55e; color:#04210f; }
  </style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <select id="sessSel" title="Conversas"></select>
    <button class="ghost" id="newBtn" title="Nova conversa">+</button>
    <button class="ghost" id="speak" title="Ouvir as respostas (listener)">🔇</button>
    <select id="agentSel" title="Agente"></select>
  </header>
  <div id="log"></div>
  <form id="form">
    <textarea id="input" rows="1" placeholder="Fale ou digite…" autocomplete="off"></textarea>
    <button type="button" class="ghost" id="mic" title="Falar (clique p/ gravar, clique p/ parar)">🎤</button>
    <button type="submit">Enviar</button>
  </form>

  <script>
    const $ = (id) => document.getElementById(id);
    const log = $('log'), dot = $('dot'), agentSel = $('agentSel'), sessSel = $('sessSel'),
          newBtn = $('newBtn'), speakBtn = $('speak'), form = $('form'), input = $('input'), micBtn = $('mic');
    let speak = false, ws, currentSession = null;

    function add(text, cls) {
      const d = document.createElement('div'); d.className = 'msg ' + cls; d.textContent = text;
      log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
    }
    function render(m) { add(m.text, m.role === 'user' ? 'me' : 'bot'); }
    function playWav(b64) {
      const bin = atob(b64), buf = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
      new Audio(URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }))).play().catch(() => {});
    }
    function tx(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }
    function openSession(id) { if (id) tx({ t: 'open', sessionId: id }); }

    function fillSessions(sessions) {
      sessSel.innerHTML = '';
      sessions.forEach(s => {
        const o = document.createElement('option'); o.value = s.id;
        o.textContent = s.title || 'Conversa'; if (s.id === currentSession) o.selected = true;
        sessSel.appendChild(o);
      });
      if (!currentSession) {
        if (sessions.length) openSession(sessions[0].id);   // open most recent
        else tx({ t: 'new' });                              // none yet -> create one
      }
    }

    function connect() {
      ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);
      ws.onopen = () => dot.classList.add('on');
      ws.onclose = () => { dot.classList.remove('on'); setTimeout(connect, 1500); };
      ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        if (m.t === 'hello') {
          agentSel.innerHTML = '';
          (m.agents || []).forEach(a => { const o = document.createElement('option'); o.value = o.textContent = a; if (a === m.default) o.selected = true; agentSel.appendChild(o); });
        }
        else if (m.t === 'sessions') fillSessions(m.sessions || []);
        else if (m.t === 'history') { currentSession = m.sessionId; sessSel.value = currentSession; log.innerHTML = ''; (m.messages || []).forEach(render); }
        else if (m.t === 'message') { if (m.message.sessionId === currentSession) render(m.message); }
        else if (m.t === 'tts') { if (m.sessionId === currentSession) playWav(m.audio); }
        else if (m.t === 'error') add('erro: ' + m.message, 'err');
      };
    }

    sessSel.onchange = () => openSession(sessSel.value);
    newBtn.onclick = () => tx({ t: 'new' });
    speakBtn.onclick = () => { speak = !speak; speakBtn.classList.toggle('on', speak); speakBtn.textContent = speak ? '🔊' : '🔇'; };

    form.onsubmit = (e) => {
      e.preventDefault();
      const text = input.value.trim(); if (!text) return;
      tx({ t: 'send', text, speak, agent: agentSel.value, sessionId: currentSession });  // server echoes it back
      input.value = ''; input.style.height = 'auto';
    };
    input.oninput = () => { input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px'; };
    input.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); } };

    // push-to-talk: click to record, click to stop -> local STT on the Hub
    let recorder = null, chunks = [];
    micBtn.onclick = async () => {
      if (recorder && recorder.state === 'recording') { recorder.stop(); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream); chunks = [];
        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          micBtn.classList.remove('on'); micBtn.textContent = '🎤';
          const blob = new Blob(chunks, { type: 'audio/webm' });
          const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result.split(',')[1]); fr.readAsDataURL(blob); });
          tx({ t: 'voice', audio: b64, ext: 'webm', speak, agent: agentSel.value, sessionId: currentSession });
        };
        recorder.start(); micBtn.classList.add('on'); micBtn.textContent = '⏺';
      } catch (e) { add('mic erro: ' + e.message, 'err'); }
    };

    connect();
  </script>
</body>
</html>
