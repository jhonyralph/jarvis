<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Jarvis">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#152232"/>
      <stop offset="100%" stop-color="#0b0d10"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="45%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- full-bleed background so the maskable crop always shows a solid tile -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- arc-reactor emblem, kept within the maskable safe zone (center ~60%) -->
  <g transform="translate(256,256)" fill="none" stroke="#2563eb" stroke-linecap="round" filter="url(#glow)">
    <circle r="150" stroke="#1d4ed8" stroke-opacity="0.5" stroke-width="6"/>
    <!-- segmented outer ring -->
    <g stroke="#60a5fa" stroke-width="14" stroke-opacity="0.9">
      <path d="M 0 -128 A 128 128 0 0 1 110.9 -64"/>
      <path d="M 110.9 64 A 128 128 0 0 1 0 128"/>
      <path d="M -110.9 64 A 128 128 0 0 1 -110.9 -64"/>
    </g>
    <circle r="92" stroke="#3b82f6" stroke-width="8" stroke-opacity="0.85"/>
  </g>

  <!-- glowing core -->
  <circle cx="256" cy="256" r="46" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="46" fill="none" stroke="#eff6ff" stroke-width="3" stroke-opacity="0.9"/>
</svg>
